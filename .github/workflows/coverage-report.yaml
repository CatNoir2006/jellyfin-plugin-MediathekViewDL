name: '📊 Coverage Report (Comment)'

on:
  workflow_run:
    workflows: ['📊 Coverage Report']
    types:
      - completed

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  report-backend-coverage:
    name: 'Comment backend coverage'
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download backend coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: coverage/backend
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Report backend coverage
        uses: 5monkeys/cobertura-action@v14
        with:
          path: coverage/backend/**/coverage.cobertura.xml
          minimum_coverage: 0
          fail_below_threshold: false
          repo_token: ${{ secrets.GITHUB_TOKEN }}

  report-frontend-coverage:
    name: 'Comment frontend coverage'
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download frontend coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend-coverage
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Report frontend coverage
        uses: davelosert/vitest-coverage-report-action@v2.12.2
        with:
          coverage-summary-path: frontend-coverage/coverage/coverage-summary.json
          vitest-coverage-fail-threshold: 0
