name: '🧪 Frontend Tests'

on:
  push:
    branches:
      - master
    paths:
      - 'Jellyfin.Plugin.MediathekViewDL/Configuration/Web/**'
      - '.github/workflows/frontend-tests.yaml'
  pull_request:
    branches:
      - master
    paths:
      - 'Jellyfin.Plugin.MediathekViewDL/Configuration/Web/**'
      - '.github/workflows/frontend-tests.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vitest:
    name: 'Vitest (Vue)'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Jellyfin.Plugin.MediathekViewDL/Configuration/Web/VueJS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Jellyfin.Plugin.MediathekViewDL/Configuration/Web/VueJS/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build VueJS
        run: npm run build

      - name: Run unit tests
        run: npm test
